name: CI/CD Pipeline - Cars Dealership Capstone

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      - name: Run flake8 lint
        run: |
          flake8 server/djangoapp --count --select=E9,F63,F7,F82 --show-source --statistics
          echo "Lint check passed!"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django djangorestframework requests

      - name: Run Django tests
        run: |
          cd server
          python manage.py test djangoapp --verbosity=2
          echo "All tests passed!"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t cars-dealership:latest ./server
          echo "Docker image built successfully!"

      - name: Verify image
        run: |
          docker images cars-dealership:latest
          echo "Build complete - image ready for deployment"
